<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzz Demo</title>
  <link rel="stylesheet" href="puzz.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
    }
    #puzzle {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="puzzle"></div>

  <script src="puzz.js"></script>
  <script>
    new Puzz(document.getElementById('puzzle'), 'config.json').init();
  </script>
</body>
</html>
